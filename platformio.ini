; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Default build environments (comma-separated). Change as needed.
;[platformio]
;default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
lib_deps = 
    ArduinoJson
build_flags = -DBOARD_TYPE=1

; ------------------------------------------------------------------
; ESP32 development environment
; Use this to build for generic ESP32 boards (e.g. ESP32 DevKitC)
; To build for your specific board, change `board` accordingly.
; ------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
lib_deps =
    ArduinoJson
    Servo
    ; Bluepad32 is vendored under lib/bluepad32 (full library with submodules)
build_flags = -DBOARD_TYPE=2
; If you need additional ESP32-specific libraries, add them above.
